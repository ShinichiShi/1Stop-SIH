name: Basic CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: basic-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Repo smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Basic repository checks
        run: |
          test -f readme.md
          test -f docker-compose.yaml
          test -d admin
          test -d server

  web-build:
    name: Server + Admin build checks
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            admin/package-lock.json
            server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: TypeScript check (server)
        working-directory: server
        run: npx tsc -p tsconfig.json --noEmit

      - name: Install admin dependencies
        working-directory: admin
        run: npm install

      - name: Build admin
        working-directory: admin
        run: npm run build
